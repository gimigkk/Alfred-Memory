<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfred - Real-Time Memory Graph</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <div class="left-container">
        <div class="glass-header">
            <h1>Alfred Memory Explorer</h1>
            <p>Memory Vault Viewer</p>
        </div>
        <div id="side-panel" class="side-panel hidden">
            <div id="side-panel-content"></div>
        </div>
    </div>
    <div class="right-container">
        <div class="glass-header">
            <h1>Active Reminders</h1>
            <p>SQLite Debug Panel</p>
        </div>
        <div id="reminders-panel" class="side-panel">
            <div id="reminders-content" class="tooltip-content">
                <!-- Reminders injected here -->
            </div>
        </div>
    </div>
    <div id="mynetwork"></div>
    <script src="app.js"></script>
</body>
</html>
